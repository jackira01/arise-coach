# docker-compose.yml — solo para desarrollo local y el VPS del backend
services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/arise-coach
    ports:
      - "4000:4000"
    depends_on:
      - mongo

volumes:
  mongo_data:
